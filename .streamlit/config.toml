[theme]
# Màu chủ đạo (dùng cho các nút bấm, thanh slider, và các hiệu ứng tương tác)
# Chọn màu hồng cánh sen pha chút pastel để nổi bật và dễ thương
primaryColor = "#FF7A9A"

# Màu nền chính của toàn bộ trang web
# Chọn màu hồng phấn cực nhạt để làm nổi bật chiếc hộp 3D và không làm chói mắt
backgroundColor = "#FFF5F7"

# Màu nền phụ (dùng cho các sidebar, hoặc các form nhập liệu)
# Đậm hơn nền chính một chút để tạo chiều sâu (depth) cho giao diện
secondaryBackgroundColor = "#FFE4E8"

# Màu chữ
# Thay vì dùng màu đen tuyền (#000000) hơi thô, dùng màu mận chín (đỏ đô sẫm) để hài hòa với tone hồng
textColor = "#5C102A"

# Font chữ
# Dùng sans-serif để mang lại cảm giác hiện đại, gọn gàng và dễ đọc trên điện thoại
font = "sans serif"

[server]
# Ẩn menu mặc định của Streamlit (ba dấu chấm góc trên) để web trông giống một app chuyên nghiệp hơn
enableCORS = false